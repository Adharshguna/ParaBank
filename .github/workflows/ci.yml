name: Parabank UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['7.0.x']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build project
      run: dotnet build --no-restore --configuration Release
    
    - name: Install Playwright browsers
      run: dotnet tool install --global Microsoft.Playwright.CLI && playwright install
    
    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal --logger "console;verbosity=detailed"
    
    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts-${{ matrix.dotnet-version }}
        path: |
          traces/
          screenshots/
          videos/
        retention-days: 7